  --ai-skills: #FFCC00;
  --ai-skills-text: #FFCC00;
  --web-design: #33CCFF;
  --root: #FFFFFF;

  /* Node states */
  --locked-stroke: #3A4150;
  --locked-fill: #171B23;
  --unlocked-glow: 0 0 6px;

  /* Type */
  --font-display: "Chakra Petch", "Rajdhani", sans-serif;
  --font-body: "Inter", system-ui, sans-serif;
}

/* Light theme — dark stays the default; this only applies when the toggle set the attribute */
html[data-theme="light"] {
  --bg: #F5F2EA;
  --bg-glow: #EAE5D8;
  --bg-glow-fade: rgba(234, 229, 216, 0);
  --tooltip-bg: #14161B;
  --tooltip-ink: #F5F2EA;
  --shadow: rgba(0, 0, 0, 0.18);

  --ink: rgba(20, 22, 27, 0.92);
  --ink-muted: rgba(20, 22, 27, 0.6);
  --node-text: rgba(20, 22, 27, 0.5);
  --node-text-bright: rgba(20, 22, 27, 0.92);
  --root-hover-glow: rgba(20, 22, 27, 0.18);
  --m-root-ink: rgba(20, 22, 27, 0.75);

  --ai-skills-text: #A88A00;
  --root: #14161B;

  --locked-stroke: #C6C0B0;
  --locked-fill: #EDE9DE;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { background: var(--bg); }
body {
  background: var(--bg);
  color: var(--root);
  font-family: var(--font-body);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ---------- header ---------- */
.site-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
  max-width: 1160px;
  margin: 0 auto;
  padding: 28px 24px 8px;
}
.site-header h1 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 22px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.site-header .subtitle {
  font-size: 13px;
  color: var(--ink-muted);
  margin-top: 4px;
}
.header-tools { display: flex; align-items: flex-end; gap: 14px; }
.theme-toggle {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: 1px solid var(--locked-stroke);
  background: transparent;
  color: var(--ink-muted);
  display: grid;
  place-items: center;
  cursor: pointer;
  transition: color 0.2s ease, border-color 0.2s ease;
}
.theme-toggle:hover { color: var(--root); border-color: var(--root); }
.theme-toggle:focus-visible { outline: 2px solid var(--root); outline-offset: 2px; }
.theme-toggle svg { width: 18px; height: 18px; }
.theme-toggle .icon-sun { display: none; }
html[data-theme="light"] .theme-toggle .icon-moon { display: none; }
html[data-theme="light"] .theme-toggle .icon-sun { display: block; }

/* ---------- tree canvas ---------- */
.tree-wrap {
  position: relative;
  max-width: 1160px;
  margin: 0 auto;
  padding: 8px 12px 48px;
}
.tree-wrap::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 60% 45% at 50% 55%, var(--bg-glow) 0%, var(--bg-glow-fade) 70%);
  pointer-events: none;
}
.tree-canvas {
  position: relative;
  width: 100%;
  aspect-ratio: 1160 / 1330;
}
.tree-canvas svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
  overflow: visible;
}

/* edges */
.edge-core {
  fill: none;
  stroke: var(--locked-stroke);
  stroke-opacity: 0.55;
  stroke-width: 6.5;
  stroke-linecap: round;
  transition: stroke 0.35s ease, stroke-opacity 0.35s ease;
}
.edge-halo {
  fill: none;
  stroke-width: 13;
  stroke-linecap: round;
  opacity: 0;
  transition: opacity 0.35s ease;
}
.edge.lit .edge-core { stroke: var(--edge-color); stroke-opacity: 0.95; }
.edge.lit .edge-halo { stroke: var(--edge-color); opacity: 0.18; }

/* nodes */
.node { transform-box: fill-box; transform-origin: 50% 50%; }
.node circle {
  fill: var(--locked-fill);
  stroke: var(--locked-stroke);
  stroke-width: 2;
  transition: fill 0.25s ease, stroke 0.25s ease, filter 0.25s ease;
}
.node text {
  font-family: var(--font-body);
  fill: var(--node-text);
  text-anchor: middle;
  transition: fill 0.25s ease;
  pointer-events: none;
}
.node.unlocked circle {
  fill: var(--node-color);
  stroke: var(--node-color);
  filter: drop-shadow(var(--unlocked-glow) var(--node-glow));
}
.node.unlocked text { fill: var(--surface-ink); }
.node.hovered { transform: scale(1.06); }
.node.decorative circle { fill: var(--locked-fill); stroke: var(--locked-stroke); stroke-opacity: 0.8; }
.node.root-node circle { fill: transparent; stroke: var(--root); }
.node.root-node text { fill: var(--node-text-bright); }
.node.root-node.hovered circle { filter: drop-shadow(var(--unlocked-glow) var(--root-hover-glow)); }

/* branch base labels */
.branch-chip-bg { fill: var(--bg); fill-opacity: 0.88; }
.branch-label {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  fill: var(--ink);
  text-anchor: middle;
}
/* button overlay (accessibility + all pointer input) */
.hit-layer { position: absolute; inset: 0; }
.hit-layer button {
  position: absolute;
  background: transparent;
  border: 0;
  border-radius: 50%;
  cursor: pointer;
  padding: 0;
}
.hit-layer button:focus-visible {
  outline: 2px solid var(--node-color);
  outline-offset: 3px;
}
.hit-layer a.root-link {
  position: absolute;
  border-radius: 50%;
  cursor: pointer;
}
.hit-layer a.root-link:focus-visible {
  outline: 2px solid var(--root);
  outline-offset: 3px;
}

/* ---------- tooltip ---------- */
.tooltip {
  position: fixed;
  z-index: 50;
  max-width: 270px;
  background: var(--tooltip-bg);
  color: var(--tooltip-ink);
  border-radius: 8px;
  padding: 12px 14px;
  box-shadow: 0 6px 24px var(--shadow);
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.15s ease;
  pointer-events: none;
}
.tooltip.show { opacity: 1; visibility: visible; }
.tooltip.wide { max-width: 360px; }
.tooltip .tt-name {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.tooltip .tt-desc {
  font-family: var(--font-body);
  font-size: 13px;
  line-height: 1.5;
}
/* ---------- mobile stacked layout ---------- */
.mobile-stack { display: none; }

@media (max-width: 767px) {
  .tree-wrap { display: none; }
  .site-header { flex-wrap: wrap; padding: 22px 18px 4px; }

  .mobile-stack {
    display: block;
    padding: 12px 18px 48px;
    max-width: 480px;
    margin: 0 auto;
  }
  .mobile-branch { margin-top: 26px; }
  .mobile-branch > header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    border-bottom: 2px solid var(--node-color);
    padding-bottom: 6px;
    margin-bottom: 4px;
  }
  .mobile-branch h2 {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--node-text-color, var(--node-color));
  }
  .mobile-branch ol { list-style: none; }
  .mobile-branch li { position: relative; padding: 4px 0; }
  .mobile-branch li + li::before {
    content: "";
    position: absolute;
    left: 21px;
    top: -14px;
    width: 4px;
    height: 22px;
    border-radius: 2px;
    background: var(--locked-stroke);
    opacity: 0.55;
  }
  .mobile-branch li + li.lit-in::before { background: var(--node-color); opacity: 0.9; }
  .m-node {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    background: transparent;
    border: 0;
    padding: 6px 4px;
    cursor: pointer;
    text-align: left;
    border-radius: 8px;
  }
  .m-node:focus-visible { outline: 2px solid var(--node-color); outline-offset: 2px; }
  .m-node .m-dot {
    flex: 0 0 auto;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 2px solid var(--locked-stroke);
    background: var(--locked-fill);
    transition: background 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
  }
  .m-node .m-name {
    font-family: var(--font-body);
    font-size: 15px;
    color: var(--node-text);
    transition: color 0.25s ease;
  }
  .m-node.unlocked .m-dot {
    background: var(--node-color);
    border-color: var(--node-color);
    box-shadow: var(--unlocked-glow) var(--node-glow);
  }
  .m-node.unlocked .m-name { color: var(--root); }
  .mobile-root { --node-color: var(--root); }
  .mobile-root h2 a {
    color: var(--root);
    text-decoration: none;
  }
  .mobile-root h2 a:hover, .mobile-root h2 a:focus-visible { text-decoration: underline; }
  .m-root-desc {
    font-family: var(--font-body);
    font-size: 13.5px;
    line-height: 1.55;
    color: var(--m-root-ink);
    padding: 8px 4px 0;
  }
}

/* ---------- tools marquee footer ---------- */
.tools-marquee {
  border-top: 1px solid var(--locked-stroke);
  margin-top: 8px;
  padding: 22px 0 28px;
}
.marquee-label {
  text-align: center;
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 16px;
}
.marquee-viewport {
  overflow: hidden;
  -webkit-mask-image: linear-gradient(90deg, transparent, #000 12%, #000 88%, transparent);
  mask-image: linear-gradient(90deg, transparent, #000 12%, #000 88%, transparent);
}
.marquee-track {
  display: flex;
  width: max-content;
  animation: marquee-scroll 35s linear infinite;
}
.tools-marquee:hover .marquee-track { animation-play-state: paused; }
.marquee-group {
  display: flex;
  align-items: center;
  gap: 56px;
  padding-right: 56px;
}
.tool-logo { display: block; color: var(--ink-muted); }
.tool-logo svg { display: block; height: 26px; width: auto; }
/* the Stitch pill is much wider than tall; full cap height reads oversized next to square marks */
.tool-logo[data-id="stitch"] svg { height: 18px; }
@keyframes marquee-scroll { to { transform: translateX(-50%); } }

/* ---------- reduced motion ---------- */
@media (prefers-reduced-motion: reduce) {
  .node.hovered { transform: none; }
  .node circle, .node text, .edge-core, .edge-halo, .m-node .m-dot, .m-node .m-name {
    transition-duration: 0.01ms;
  }
  .node.unlocked circle, .m-node.unlocked .m-dot { transition: opacity 0.2s ease; }
  .tooltip { transition: none; }
  .marquee-track { animation: none; }
}
</style>

/* ================= svg build ================= */
const SVG_NS = "http://www.w3.org/2000/svg";
const svg = document.getElementById("tree-svg");
const hitLayer = document.getElementById("hit-layer");
const VB = { w: 1160, h: 1330 };

function el(name, attrs, parent) {
  const e = document.createElementNS(SVG_NS, name);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  if (parent) parent.appendChild(e);
  return e;
}

function edgePath(a, b) { /* a = parent (lower), b = child (upper) */
  const y1 = a.y - a.d / 2 + 2;
  const y2 = b.y + b.d / 2 - 2;
  const bend = Math.max(36, Math.min(95, (y1 - y2) * 0.55));
  return `M ${a.x} ${y1} C ${a.x} ${y1 - bend}, ${b.x} ${y2 + bend}, ${b.x} ${y2}`;
}

function branchVars(branch) {
  const b = BRANCHES[branch];
  return `--node-color:${b.cssColor};--node-text-color:${b.textColor};--node-glow:${b.glow};--edge-color:${b.cssColor};`;
}

function wrapLabel(name, d) {
  const size = d >= 68 ? 11.5 : d >= 58 ? 11 : 10.5;
  const maxChars = Math.max(4, Math.floor((d - 14) / (size * 0.56)));
  const words = name.split(" ");
  const lines = [];
  let cur = "";
  for (const w of words) {
    const cand = cur ? cur + " " + w : w;
    if (cand.length <= maxChars || !cur) cur = cand;
    else { lines.push(cur); cur = w; }
  }
  if (cur) lines.push(cur);
  return { lines, size };
}

const nodeEls = {};   /* moduleId -> <g.node> */
const buttonEls = {}; /* moduleId -> desktop overlay button */
const mobileEls = {}; /* moduleId -> mobile row button */
let rootLinkEl = null; /* desktop overlay link for the root (Josh) */

/* ================= tools marquee ================= */
function buildMarquee() {
  const track = document.getElementById("marquee-track");
  for (let copy = 0; copy < 2; copy++) {
    const group = document.createElement("div");
    group.className = "marquee-group";
    if (copy === 1) group.setAttribute("aria-hidden", "true");
    for (const logo of TOOL_LOGOS) {
      const item = document.createElement("span");
      item.className = "tool-logo";
      item.dataset.id = logo.id;
      item.setAttribute("role", "img");
      item.setAttribute("aria-label", logo.name);
      item.title = logo.name;
      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.setAttribute("viewBox", logo.viewBox);
      svg.setAttribute("focusable", "false");
      svg.setAttribute("aria-hidden", "true");
      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("d", logo.path);
      path.setAttribute("fill", "currentColor");
      if (logo.fillRule) path.setAttribute("fill-rule", logo.fillRule);
      svg.appendChild(path);
      item.appendChild(svg);
      group.appendChild(item);
    }
    track.appendChild(group);
  }
}

function buildSvg() {
  const gEdges = el("g", { id: "edges" }, svg);
  for (const [p, c] of EDGES) {
    const a = NODES[p], b = NODES[c];
    const branch = b.branch || a.branch;
    /* edges into modules render lit; edges into decorative connectors stay muted */
    const g = el("g", { class: NODES[c].kind === "module" ? "edge lit" : "edge", "data-edge": `${p}->${c}`, style: branchVars(branch) }, gEdges);
    const d = edgePath(a, b);
    el("path", { class: "edge-halo", d }, g);
    el("path", { class: "edge-core", d }, g);
  }

  const gNodes = el("g", { id: "nodes" }, svg);
  for (const id in NODES) {
    const n = NODES[id];
    if (n.kind === "root") {
      const g = el("g", { class: "node root-node", "data-node": id }, gNodes);
      el("circle", { cx: n.x, cy: n.y, r: n.d / 2 }, g);
      const { lines, size } = wrapLabel(JOSH.name, n.d);
      const lh = size * 1.18;
      const text = el("text", { x: n.x, y: n.y, "font-size": size }, g);
      const y0 = n.y - ((lines.length - 1) / 2) * lh + size * 0.34;
      lines.forEach((line, i) => {
        const t = el("tspan", { x: n.x, y: y0 + i * lh }, text);
        t.textContent = line;
      });
      nodeEls[id] = g; /* fit-pass only; render() never touches the root */
      continue;
    }
    if (n.kind === "connector") {
      const g = el("g", { class: "node decorative", "data-node": id }, gNodes);
      el("circle", { cx: n.x, cy: n.y, r: n.d / 2 }, g);
      continue;
    }
    const m = MODULES[id];
    const g = el("g", { class: "node module unlocked", "data-node": id, style: branchVars(n.branch) }, gNodes);
    el("circle", { cx: n.x, cy: n.y, r: n.d / 2 }, g);
    const { lines, size } = wrapLabel(m.name, n.d);
    const lh = size * 1.18;
    const text = el("text", { x: n.x, y: n.y, "font-size": size }, g);
    const y0 = n.y - ((lines.length - 1) / 2) * lh + size * 0.34;
    lines.forEach((line, i) => {
      const t = el("tspan", { x: n.x, y: y0 + i * lh }, text);
      t.textContent = line;
    });
    nodeEls[id] = g;
  }

  /* branch base labels + per-branch counters (chip sits on the root edge, like the approved render) */
  const gLabels = el("g", { id: "branch-labels" }, svg);
  for (const branch in BRANCHES) {
    const base = SKILL_TREE_DATA.modules.find(m => m.branch === branch && m.order === 1);
    const n = NODES[base.id];
    const g = el("g", { style: branchVars(branch) }, gLabels);
    const label = BRANCHES[branch].label.toUpperCase();
    const w = label.length * 9.2 + 26;
    el("rect", { class: "branch-chip-bg", x: n.x - w / 2, y: 1122, width: w, height: 26, rx: 5 }, g);
    const t1 = el("text", { class: "branch-label", x: n.x, y: 1140 }, g);
    t1.textContent = label;
  }

  /* invisible-but-focusable button per module (all clicks/taps/keys land here) */
  for (const m of SKILL_TREE_DATA.modules) {
    const n = NODES[m.id];
    const b = document.createElement("button");
    b.type = "button";
    b.dataset.id = m.id;
    b.setAttribute("aria-label", `${m.name}. ${m.description}`);
    b.style.left = ((n.x - n.d / 2) / VB.w * 100) + "%";
    b.style.top = ((n.y - n.d / 2) / VB.h * 100) + "%";
    b.style.width = (n.d / VB.w * 100) + "%";
    b.style.height = (n.d / VB.h * 100) + "%";
    b.style.setProperty("--node-color", BRANCHES[m.branch].cssColor);
    hitLayer.appendChild(b);
    buttonEls[m.id] = b;
  }

  /* root = Josh: a real link (new tab), not an unlock button */
  const n = NODES[JOSH.id];
  const a = document.createElement("a");
  a.className = "root-link";
  a.href = JOSH.url;
  a.target = "_blank";
  a.rel = "noopener";
  a.setAttribute("aria-label", `${JOSH.name}. ${JOSH.description} Opens joshwexler.com in a new tab.`);
  a.style.left = ((n.x - n.d / 2) / VB.w * 100) + "%";
  a.style.top = ((n.y - n.d / 2) / VB.h * 100) + "%";
  a.style.width = (n.d / VB.w * 100) + "%";
  a.style.height = (n.d / VB.h * 100) + "%";
  hitLayer.appendChild(a);
  rootLinkEl = a;
}

function buildMobile() {
  const stack = document.getElementById("mobile-stack");
  for (const branch in BRANCHES) {
    const section = document.createElement("section");
    section.className = "mobile-branch";
    section.style.cssText = branchVars(branch);
    const header = document.createElement("header");
    const h2 = document.createElement("h2");
    h2.textContent = BRANCHES[branch].label;
    header.append(h2);
    const ol = document.createElement("ol");
    SKILL_TREE_DATA.modules
      .filter(m => m.branch === branch)
      .sort((a, b) => a.order - b.order)
      .forEach(m => {
        const li = document.createElement("li");
        li.className = "lit-in";
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "m-node unlocked";
        btn.dataset.id = m.id;
        btn.setAttribute("aria-label", `${m.name}. ${m.description}`);
        const dot = document.createElement("span");
        dot.className = "m-dot";

        name.className = "m-name";
        name.textContent = m.name;
        btn.append(dot, name);
        li.appendChild(btn);
        ol.appendChild(li);
        mobileEls[m.id] = btn;
      });
    section.append(header, ol);
    stack.appendChild(section);
  }

  /* root = Josh at the bottom of the stack; no hover on touch, so the bio is inline */
  const section = document.createElement("section");
  section.className = "mobile-branch mobile-root";
  const header = document.createElement("header");
  const h2 = document.createElement("h2");
  const a = document.createElement("a");

  header.appendChild(h2);
  const p = document.createElement("p");
  p.className = "m-root-desc";
  p.textContent = JOSH.description;
  section.append(header, p);
  stack.appendChild(section);
}

/* ================= tooltip ================= */
const tooltip = document.getElementById("tooltip");
const ttName = tooltip.querySelector(".tt-name");
const ttDesc = tooltip.querySelector(".tt-desc");
let tooltipFor = null;
let tooltipAnchor = null;

function showTooltip(id, anchor) {
  const m = MODULES[id];
  ttName.textContent = m.name;
  ttDesc.textContent = m.description;
  tooltip.classList.toggle("wide", id === JOSH.id); /* Josh's bio needs more room */
  tooltip.classList.add("show");
  tooltipFor = id;
  tooltipAnchor = anchor;
  const r = anchor.getBoundingClientRect();
  tooltip.style.left = "0px"; tooltip.style.top = "0px"; /* reset before measuring */
  const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
  let x = r.right + 12;
  if (x + tw > window.innerWidth - 8) x = r.left - tw - 12;   /* flip to the left */
  let y = r.top + r.height / 2 - th / 2;
  y = Math.max(8, Math.min(y, window.innerHeight - th - 8));
  if (x < 8) {
    /* no room on either side (narrow screens): put it under or above the anchor */
    x = Math.max(8, Math.min(r.left, window.innerWidth - tw - 8));
    y = r.bottom + 8 + th > window.innerHeight - 8 ? r.top - th - 8 : r.bottom + 8;
    y = Math.max(8, y);
  }
  tooltip.style.left = x + "px";
  tooltip.style.top = y + "px";
}
function hideTooltip() {
  tooltip.classList.remove("show");
  tooltipFor = null;
  tooltipAnchor = null;
}

/* ================= interactions ================= */
function wireButton(btn) {
  const id = btn.dataset.id;
  btn.addEventListener("click", () => showTooltip(id, btn));
  btn.addEventListener("mouseenter", () => {
    showTooltip(id, btn);
    if (nodeEls[id]) nodeEls[id].classList.add("hovered");
  });
  btn.addEventListener("mouseleave", () => {
    hideTooltip();
    if (nodeEls[id]) nodeEls[id].classList.remove("hovered");
  });
  btn.addEventListener("focus", () => showTooltip(id, btn));
  btn.addEventListener("blur", hideTooltip);
}

/* fit pass: shrink any label whose widest line overflows its circle (real font metrics) */
function fitLabels() {
  for (const id in nodeEls) {
    const n = NODES[id];
    const text = nodeEls[id].querySelector("text");
    const tspans = [...text.querySelectorAll("tspan")];
    const size = parseFloat(text.getAttribute("font-size"));
    const maxW = Math.max(...tspans.map(t => t.getComputedTextLength()));
    const allowed = n.d - 8;
    if (maxW <= allowed) continue;
    const newSize = Math.max(8.5, size * allowed / maxW);
    text.setAttribute("font-size", newSize);
    const lh = newSize * 1.18;
    const y0 = n.y - ((tspans.length - 1) / 2) * lh + newSize * 0.34;
    tspans.forEach((t, i) => t.setAttribute("y", y0 + i * lh));
  }
}

/* ================= theme toggle ================= */
const THEME_KEY = "camp-codex-skill-tree:theme";
function initThemeToggle() {
  const btn = document.getElementById("theme-toggle");
  const sync = () => {
    const light = document.documentElement.dataset.theme === "light";
    btn.setAttribute("aria-pressed", String(light));
    btn.setAttribute("aria-label", light ? "Switch to dark mode" : "Switch to light mode");
  };
  btn.addEventListener("click", () => {
    if (document.documentElement.dataset.theme === "light") {
      delete document.documentElement.dataset.theme;
      try { localStorage.removeItem(THEME_KEY); } catch (e) { /* ignore */ }
    } else {
      document.documentElement.dataset.theme = "light";
      try { localStorage.setItem(THEME_KEY, "light"); } catch (e) { /* ignore */ }
    }
    sync();
  });
  sync();
}

/* ================= boot ================= */
buildSvg();
buildMobile();
buildMarquee();
initThemeToggle();
if (document.fonts && document.fonts.ready) document.fonts.ready.then(fitLabels);
else fitLabels();
for (const id in buttonEls) wireButton(buttonEls[id]);
for (const id in mobileEls) wireButton(mobileEls[id]);
rootLinkEl.addEventListener("mouseenter", () => {
  showTooltip(JOSH.id, rootLinkEl);
  nodeEls[JOSH.id].classList.add("hovered");
});
rootLinkEl.addEventListener("mouseleave", () => {
  hideTooltip();
  nodeEls[JOSH.id].classList.remove("hovered");
});
rootLinkEl.addEventListener("focus", () => showTooltip(JOSH.id, rootLinkEl));
rootLinkEl.addEventListener("blur", hideTooltip);
document.addEventListener("pointerdown", e => {
  if (tooltipFor && !e.target.closest("button[data-id]")) hideTooltip();
});
window.addEventListener("scroll", () => {
  /* keep the tooltip pinned to its node while the page scrolls */
  if (tooltipFor && tooltipAnchor) showTooltip(tooltipFor, tooltipAnchor);
}, { passive: true });
</script>
